services:
  postgres:
    image: postgres:16-alpine
    container_name: zapstore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zapstore
      POSTGRES_PASSWORD: zapstore_dev
      POSTGRES_DB: zapstore
    ports:
      - "5432:5432"
    volumes:
      - zapstore_pg_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zapstore -d zapstore"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zapstore_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - zapstore_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  evolution:
    image: atendai/evolution-api:v2.2.3
    container_name: zapstore_evolution
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: http://localhost:8080

      # Auth
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-53bd01c83c61cb38d44e1f3683c6e55173d1d1355ef4a24f}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # Postgres (db separado: evolution)
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://zapstore:zapstore_dev@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution_exchange
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"

      # Cache Redis
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_LOCAL_ENABLED: "false"

      # Webhook global (recebe mensagens em nossa API Fastify)
      # host.docker.internal funciona em Windows e Mac. Em Linux precisaria de host network.
      WEBHOOK_GLOBAL_URL: ${EVOLUTION_WEBHOOK_URL:-http://host.docker.internal:4000/webhooks/whatsapp}
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_QRCODE_UPDATED: "true"
      WEBHOOK_EVENTS_CONNECTION_UPDATE: "true"

      # Outros
      LOG_LEVEL: ERROR,WARN,INFO
      LOG_COLOR: "true"
      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
      CONFIG_SESSION_PHONE_CLIENT: Zapstore
      CONFIG_SESSION_PHONE_NAME: Chrome
    volumes:
      - zapstore_evolution_instances:/evolution/instances
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  zapstore_pg_data:
  zapstore_redis_data:
  zapstore_evolution_instances:
